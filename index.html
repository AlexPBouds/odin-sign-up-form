<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Sign-Up Form</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="logo-container">
          <img
            src="./images/odin-sidebar.png"
            alt="Odin Logo"
            class="logo-image"
          />
          <div class="logo-text">ODIN</div>
        </div>

        <div class="photo-credit">
          Photo by
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
          <a href="https://unsplash.com/">Unsplash</a>
        </div>
      </div>

      <div class="right">
        <div class="top">
          <div class="text-container">
            <div class="intro-text">
              This is not a real online service! You know you need something
              like this in your life to help you realize your deepest dreams.
              <br />Sign up <i>now</i> to get started.
            </div>

            <div class="inspirational-text">You <i>know</i> you want to.</div>

            <div class="encouragement-text">Let's do this!</div>
          </div>

          <form id="signUpForm" action="/sign-up" method="POST">
            <!-- First Name Input -->
            <div class="input-field">
              <label for="first_name"
                >FIRST NAME
                <div style="color: #ff4d4f">*</div></label
              >
              <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="First"
                required
              />
            </div>

            <!-- Last Name Input -->
            <div class="input-field">
              <label for="last_name"
                >LAST NAME
                <div style="color: #ff4d4f">*</div></label
              >
              <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="Last"
                required
              />
            </div>

            <!-- Email Input -->
            <div class="input-field">
              <label for="email"
                >EMAIL
                <div style="color: #ff4d4f">*</div></label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required
              />
            </div>

            <!-- Phone Number Input -->
            <div class="input-field">
              <label for="phone_number"
                >PHONE NUMBER
                <div style="color: #ff4d4f">*</div></label
              >
              <input
                type="tel"
                id="phone_number"
                name="phone_number"
                placeholder="123-456-7890"
                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                autocomplete="tel"
              />
            </div>

            <!-- Password Input -->
            <div class="input-field">
              <label for="password"
                >PASSWORD
                <div style="color: #ff4d4f">*</div></label
              >
              <input type="password" id="password" name="password" required />
            </div>

            <!-- Confirm Password Input -->
            <div class="input-field">
              <label for="confirm_password"
                >CONFIRM PASSWORD
                <div style="color: #ff4d4f">*</div></label
              >
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
              />
            </div>
          </form>
        </div>

        <div class="bottom">
          <button type="submit" form="signUpForm" class="create-account-button">
            Create Account
          </button>

          <div class="login-text">
            Already have an account? <a href="#">Log in</a>
          </div>
        </div>
      </div>
    </div>

    <div id="popup">
      <h3>Form Submitted!</h3>
      <div id="popupContent"></div>
      <button id="closePopup">Close</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
