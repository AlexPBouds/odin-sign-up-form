<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Odin Sign-Up Form</title>
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div class="logo-container">
          <img
            src="./images/odin-sidebar.png"
            alt="Odin Logo"
            class="logo-image"
          />
          <div class="logo-text">ODIN</div>
        </div>

        <div class="photo-credit">
          Photo by&nbsp;
          <a href="https://unsplash.com/@haliewestphoto">Halie West</a
          >&nbsp;on&nbsp;
          <a href="https://unsplash.com/">Unsplash</a>
        </div>
      </div>

      <div class="right">
        <div class="top">
          <div class="text-container">
            <div class="intro-text">
              This is not a real online service! You know you need something
              like this in your life to help you realize your deepest dreams.
              Sign up
              <i>now</i> to get started.
            </div>

            <div class="inspirational-text">You <i>know</i> you want to.</div>

            <div class="encouragement-text">Let's do this!</div>
          </div>

          <div class="sign-up-container">
            <form id="signUpForm" action="/sign-up" method="POST">
              <!-- First Name Input -->
              <label for="first_name">FIRST NAME</label>
              <input
                type="text"
                id="first_name"
                name="first_name"
                placeholder="First"
                required
              />

              <!-- Last Name Input -->
              <label for="last_name">LAST NAME</label>
              <input
                type="text"
                id="last_name"
                name="last_name"
                placeholder="Last"
                required
              />

              <!-- Email Input -->
              <label for="email">EMAIL</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="example@email.com"
                required
              />

              <!-- Phone Number Input -->
              <label for="phone_number">PHONE NUMBER</label>
              <input
                type="tel"
                id="phone_number"
                name="phone_number"
                placeholder="123-456-7890"
                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                autocomplete="tel"
              />

              <!-- Password Input -->
              <label for="password">PASSWORD</label>
              <input type="password" id="password" name="password" required />

              <!-- Confirm Password Input -->
              <label for="confirm_password">CONFIRM PASSWORD</label>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
              />
            </form>
          </div>
        </div>

        <div class="bottom">
          <button type="submit" form="signUpForm" class="create-account-button">
            Create Account
          </button>

          <div class="login-text">
            Already have an account? <a href="#">Log in</a>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
